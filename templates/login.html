{% extends "base.html" %}

{% block content %}
<div style="width: 300px; margin: 50px auto; background: white; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px;">
    <h2 style="text-align: center;">System Login</h2>
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" style="width: 100%;" required>
        
        <label>Password</label>
        <input type="password" name="password" style="width: 100%;" required>
        
        <button type="submit" style="width: 100%; margin-top: 10px;">Login Securely</button>
    </form>
    <p style="text-align: center; font-size: 12px; color: #666; margin-top: 10px;">
        Default: admin / admin123
    </p>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<h2>Add Employee</h2>
<form method="POST" enctype="multipart/form-data" style="background: white; padding: 20px; border-radius: 8px; max-width: 500px;">
    
    <label>Profile Picture:</label><br>
    <input type="file" name="profile_pic" style="margin-bottom: 15px;"><br>

    <label>Name:</label><br>
    <input type="text" name="name" required style="width: 100%; margin-bottom: 10px;"><br>
    
    <label>Email:</label><br>
    <input type="email" name="email" required style="width: 100%; margin-bottom: 10px;"><br>
    
    <label>Department:</label><br>
    <select name="department" style="width: 100%; margin-bottom: 10px;">
        <option value="IT">IT</option>
        <option value="HR">HR</option>
        <option value="Sales">Sales</option>
    </select><br>
    
    <label>Position:</label><br>
    <input type="text" name="position" style="width: 100%; margin-bottom: 10px;"><br>
    
    <label>Date of Joining:</label><br>
    <input type="date" name="date_of_joining" style="width: 100%; margin-bottom: 10px;"><br>
    
    <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer;">Add Employee</button>
</form>
{% endblock %}
